workspace_root: "~/agent-work"

max_exec_seconds: 30
max_output_bytes: 200000

# Per-OS command allowlists (executable name only, no arguments)
allowlist:
  linux:
    - "bash"
    - "sh"
    - "ls"
    - "cat"
    - "head"
    - "tail"
    - "wc"
    - "pwd"
    - "whoami"
    - "id"
    - "df"
    - "du"
    - "ps"
    - "grep"
    - "sed"
    - "awk"
    - "find"
    - "sort"
    - "uniq"
    - "diff"
    - "file"
    - "stat"
    - "echo"
    - "date"
    - "env"
    - "uname"
    - "hostname"
    - "git"
    - "python3"
    - "pip"
    - "systemctl"
    - "journalctl"
    - "curl"
    - "wget"
    - "tar"
    - "gzip"
    - "gunzip"
    - "cp"
    - "mv"
    - "mkdir"
    - "touch"
    - "chmod"
    - "chown"
  darwin:
    - "bash"
    - "sh"
    - "zsh"
    - "ls"
    - "cat"
    - "head"
    - "tail"
    - "wc"
    - "pwd"
    - "whoami"
    - "id"
    - "df"
    - "du"
    - "ps"
    - "grep"
    - "sed"
    - "awk"
    - "find"
    - "sort"
    - "uniq"
    - "diff"
    - "file"
    - "stat"
    - "echo"
    - "date"
    - "env"
    - "uname"
    - "hostname"
    - "git"
    - "python3"
    - "pip3"
    - "launchctl"
    - "curl"
    - "tar"
    - "gzip"
    - "gunzip"
    - "cp"
    - "mv"
    - "mkdir"
    - "touch"
    - "chmod"
    - "chown"
    - "brew"
  windows:
    - "pwsh"
    - "powershell"
    - "cmd"
    - "git"
    - "python"
    - "pip"
    - "where"
    - "whoami"
    - "hostname"
    - "systeminfo"
    - "tasklist"
    - "net"
    - "sc"
    - "icacls"
    - "robocopy"
    - "xcopy"
    - "type"
    - "findstr"
    - "more"
    - "curl"

deny_patterns:
  - "(?i)rm\\s+-r"
  - "(?i)mkfs\\b"
  - "(?i)dd\\s+if="
  - "(?i)diskpart\\b"
  - "(?i)shutdown\\b"
  - "(?i)reboot\\b"
  - "(?i)format\\b"
  - "(?i)visudo\\b"
  - "(?i)passwd\\b"
  - "(?i)useradd\\b"
  - "(?i)userdel\\b"
  - "(?i)usermod\\b"
  - "(?i)chpasswd\\b"
  - "(?i)kill\\s+-9\\s+1\\b"
  - "(?i)iptables\\s+.*-F"
  - "(?i)ufw\\s+disable"
  - "(?i)net\\s+stop\\s+.*firewall"

# Sensitive system directories – writes to these paths are always blocked
sensitive_paths:
  - "/etc"
  - "/boot"
  - "/sys"
  - "/proc"
  - "/dev"
  - "/sbin"
  - "/usr/sbin"
  - "C:\\Windows"
  - "C:\\Windows\\System32"
  - "C:\\Program Files"

files:
  allow_write_extensions:
    - ".txt"
    - ".md"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".py"
    - ".sql"
    - ".csv"
    - ".log"
    - ".sh"
    - ".ps1"
    - ".bat"
    - ".cfg"
    - ".ini"
    - ".toml"
    - ".xml"
    - ".html"
    - ".css"
    - ".js"
  max_write_bytes: 500000

db:
  force_transaction: true
  write_row_limit: 1000
  # SQL patterns that are always denied in db_exec
  sql_deny_patterns:
    - "(?i)\\bDROP\\s+DATABASE\\b"
    - "(?i)\\bTRUNCATE\\b"
    - "(?i)\\bDROP\\s+SCHEMA\\b"
    - "(?i)\\bALTER\\s+USER\\b"
    - "(?i)\\bGRANT\\b"
    - "(?i)\\bREVOKE\\b"
